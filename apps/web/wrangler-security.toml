# Cloudflare Workers Security Configuration
# WAF, Workers AI, and API Gateway Integration

# Security Gateway Worker
[[workers]]
name = "humber-security-gateway"
main = "src/workers/security-gateway.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Routes for security gateway
routes = [
  { pattern = "humber-os.ai/api/*", custom_domain = true },
  { pattern = "*.humber-os.ai/api/*", custom_domain = true }
]

# Environment variables
[workers.vars]
ENVIRONMENT = "production"
WAF_ENABLED = "true"
AI_THREAT_DETECTION = "true"
SECURITY_LOGGING = "true"

# Secrets (set via wrangler secret)
# WAF_SECRET_KEY
# SECURITY_WEBHOOK_URL
# ALLOWED_ORIGINS

# KV Namespace bindings
[[workers.kv_namespaces]]
binding = "WAF_KV"
id = "your-waf-kv-namespace-id"
preview_id = "your-waf-kv-preview-id"

# D1 Database binding
[[workers.d1_databases]]
binding = "SECURITY_DB"
database_name = "humber-security"
database_id = "your-security-db-id"

# Workers AI binding
[workers.ai]
binding = "AI"

# Durable Objects (for advanced rate limiting)
[[workers.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

# AI Threat Detection Worker
[[workers]]
name = "humber-ai-threat-detection"
main = "src/workers/ai-threat-detection.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Routes for AI threat detection
routes = [
  { pattern = "humber-os.ai/ai/threat-analysis", custom_domain = true }
]

[workers.vars]
ENVIRONMENT = "production"
AI_MODEL = "@cf/meta/llama-2-7b-chat-int8"

# Bindings for AI worker
[[workers.kv_namespaces]]
binding = "SECURITY_KV"
id = "your-security-kv-namespace-id"

[[workers.d1_databases]]
binding = "THREAT_DB"
database_name = "humber-threat-intelligence"
database_id = "your-threat-db-id"

[workers.ai]
binding = "AI"

# API Gateway Worker (for backend services)
[[workers]]
name = "humber-api-gateway"
main = "src/workers/api-gateway.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.humber-os.ai/*", custom_domain = true }
]

[workers.vars]
ENVIRONMENT = "production"
UPSTREAM_URL = "https://humber-backend.internal"
ENABLE_CACHING = "true"
ENABLE_COMPRESSION = "true"

# Pages Configuration for Frontend
[pages]
project_name = "humber-os-web"
build_command = "pnpm build"
build_output_directory = "dist"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom domains
custom_domains = [
  "humber-os.ai",
  "www.humber-os.ai"
]

# Environment variables for Pages
[pages.vars]
NEXTAUTH_URL = "https://humber-os.ai"
NEXTAUTH_SECRET = "your-nextauth-secret"
DATABASE_URL = "your-database-url"
WAF_ENABLED = "true"

# Functions routing for Pages
[[pages.functions]]
pattern = "/api/*"
[pages.functions.vars]
WAF_INTEGRATION = "true"

# Security headers for Pages
[[pages.headers]]
for = "/*"
[pages.headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:; frame-ancestors 'none';"

# Redirects for security
[[pages.redirects]]
from = "/admin/*"
to = "/auth/signin"
status = 302
conditions = { Header = "X-Authenticated != true" }

[[pages.redirects]]
from = "http://humber-os.ai/*"
to = "https://humber-os.ai/:splat"
status = 301
force = true

# D1 Database Schemas
[d1_schemas.security_logs]
schema = """
CREATE TABLE IF NOT EXISTS security_logs (
  id INTEGER PRIMARY KEY AUTOINCREMENT,
  timestamp TEXT NOT NULL,
  request_id TEXT NOT NULL,
  client_ip TEXT NOT NULL,
  user_agent TEXT,
  method TEXT NOT NULL,
  url TEXT NOT NULL,
  status INTEGER,
  response_time INTEGER,
  action TEXT NOT NULL,
  rule_id TEXT,
  reason TEXT,
  threat_level TEXT,
  country TEXT,
  asn INTEGER,
  created_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX IF NOT EXISTS idx_security_logs_client_ip ON security_logs(client_ip);
CREATE INDEX IF NOT EXISTS idx_security_logs_timestamp ON security_logs(timestamp);
CREATE INDEX IF NOT EXISTS idx_security_logs_threat_level ON security_logs(threat_level);
CREATE INDEX IF NOT EXISTS idx_security_logs_action ON security_logs(action);
"""

[d1_schemas.threat_intelligence]
schema = """
CREATE TABLE IF NOT EXISTS threat_intelligence (
  id INTEGER PRIMARY KEY AUTOINCREMENT,
  ip TEXT NOT NULL UNIQUE,
  reputation INTEGER NOT NULL DEFAULT 0,
  last_seen INTEGER NOT NULL,
  threat_types TEXT NOT NULL,
  source TEXT NOT NULL,
  last_updated INTEGER NOT NULL,
  created_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX IF NOT EXISTS idx_threat_intelligence_ip ON threat_intelligence(ip);
CREATE INDEX IF NOT EXISTS idx_threat_intelligence_reputation ON threat_intelligence(reputation);
CREATE INDEX IF NOT EXISTS idx_threat_intelligence_last_updated ON threat_intelligence(last_updated);
"""

[d1_schemas.ai_threat_analysis]
schema = """
CREATE TABLE IF NOT EXISTS ai_threat_analysis (
  id INTEGER PRIMARY KEY AUTOINCREMENT,
  timestamp TEXT NOT NULL,
  client_ip TEXT NOT NULL,
  user_agent TEXT,
  url TEXT NOT NULL,
  method TEXT NOT NULL,
  threat_level TEXT NOT NULL,
  confidence INTEGER NOT NULL,
  threats TEXT NOT NULL,
  recommendation TEXT NOT NULL,
  reasoning TEXT,
  ai_model TEXT NOT NULL,
  processing_time INTEGER NOT NULL,
  created_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX IF NOT EXISTS idx_ai_analysis_client_ip ON ai_threat_analysis(client_ip);
CREATE INDEX IF NOT EXISTS idx_ai_analysis_timestamp ON ai_threat_analysis(timestamp);
CREATE INDEX IF NOT EXISTS idx_ai_analysis_threat_level ON ai_threat_analysis(threat_level);
"""

# Rate Limiting Configuration
[rate_limiting]
enabled = true

[[rate_limiting.rules]]
id = "global_rate_limit"
threshold = 1000
period = 60
action = "challenge"
match = "ip.src"

[[rate_limiting.rules]]
id = "api_rate_limit"
threshold = 200
period = 60
action = "block"
match = "ip.src"
characteristics = ["ip.src"]
counting_expression = 'http.request.uri.path matches "^/api/"'

[[rate_limiting.rules]]
id = "auth_rate_limit"
threshold = 15
period = 300
action = "block"
match = "ip.src"
characteristics = ["ip.src"]
counting_expression = 'http.request.uri.path matches "^/api/auth/"'
mitigation_timeout = 1800

# Cache Configuration
[cache]
# Static assets
[[cache.rules]]
pattern = "*.{css,js,png,jpg,jpeg,gif,svg,woff,woff2}"
ttl = 86400
browser_ttl = 86400

# API responses (selective caching)
[[cache.rules]]
pattern = "/api/public/*"
ttl = 300
browser_ttl = 60

# Workers Analytics Engine
[analytics_engine]
enabled = true
dataset = "humber_security_metrics"

# Logpush Configuration
[logpush]
enabled = true
destination = "s3://humber-security-logs/cloudflare/"
format = "json"
fields = [
  "timestamp",
  "ray_id", 
  "client_ip",
  "client_country",
  "user_agent",
  "uri",
  "method",
  "status",
  "cache_status",
  "security_level",
  "waf_action",
  "waf_rule_id",
  "edge_response_time",
  "origin_response_time"
]

# Custom SSL Configuration
[ssl]
mode = "strict"
min_tls_version = "1.2"
ciphers = ["ECDHE-RSA-AES128-GCM-SHA256", "ECDHE-RSA-AES256-GCM-SHA384"]

# Bot Management
[bot_management]
enabled = true
fight_mode = true
verified_bots = true
js_detection = true

[bot_management.score_thresholds]
block = 1
challenge = 30
allow = 50

# Load Balancing (for multiple origins)
[load_balancing]
enabled = true
method = "least_connections"

[[load_balancing.pools]]
name = "humber_api_pool"
[[load_balancing.pools.origins]]
address = "api1.humber-os.internal"
weight = 1
enabled = true

[[load_balancing.pools.origins]]
address = "api2.humber-os.internal"
weight = 1
enabled = true

# Health checks
[load_balancing.health_checks]
enabled = true
path = "/health"
interval = 30
timeout = 10
retries = 3