name = "humber-app-nextjs"
main = "worker.js"
compatibility_date = "2024-09-17"

[build]
command = "npm run build && node build-worker.js"

[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id"

[[d1_databases]]
binding = "DB"
database_name = "humber-operations"
database_id = "your-database-id"

[vars]
NEXT_PUBLIC_API_URL = "https://humber-operations-worker-prod.evafiai.workers.dev"
