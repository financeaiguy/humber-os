name = "humber-app-complete"
compatibility_date = "2024-09-17"

[build]
command = "npm run build"
cwd = "."
watch_dir = "src"

[build.upload]
format = "service-worker"

[[build.upload.rules]]
type = "ESModule"
globs = ["**/*.js", "**/*.mjs"]

[env.production]
name = "humber-app-complete"

[env.production.vars]
NEXT_PUBLIC_API_URL = "https://humber-operations-worker-prod.evafiai.workers.dev"
