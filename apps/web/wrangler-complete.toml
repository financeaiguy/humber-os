# Complete Wrangler Configuration for Humber OS with Perfect Security
# Includes all security workers, compliance endpoints, and AI services

name = "humber-complete-platform"
main = "src/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Production Environment
[env.production]
name = "humber-complete-platform-prod"
routes = [
  { pattern = "humber-os.ai/*", zone_name = "humber-os.ai" }
]

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "5.0.0"
SECURITY_VERSION = "10.0"
AUTH_SECRET = "humber-production-secret-2025"
NEXTAUTH_SECRET = "humber-production-secret-2025"
NEXTAUTH_URL = "https://humber-os.ai"
NEXT_PUBLIC_API_URL = "https://api.humber-os.ai"
NEXT_PUBLIC_TENANT_ID = "tenant-001"

# Security Configuration
WAF_ENABLED = "true"
THREAT_INTELLIGENCE_ENABLED = "true"
BEHAVIORAL_ANALYTICS_ENABLED = "true"
ZERO_TRUST_ENABLED = "true"
COMPLIANCE_MODE = "strict"

# Master Database
[[env.production.d1_databases]]
binding = "DB_MASTER"
database_name = "humber_os_master"
database_id = "1d392f9e-b2f3-4bfb-9bb3-f82484ad140f"

