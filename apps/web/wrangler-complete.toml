# Queues for async processing
[[env.production.queues.producers]]
queue = "humber-operations-queue"
binding = "OPERATIONS_QUEUE"

[[env.production.queues.producers]]
queue = "humber-security-queue"
binding = "SECURITY_QUEUE"

[[env.production.queues.producers]]
queue = "humber-compliance-queue"
binding = "COMPLIANCE_QUEUE"

[[env.production.queues.producers]]
queue = "humber-threat-intel-queue"
binding = "THREAT_QUEUE"

[[env.production.queues.consumers]]
queue = "humber-security-queue"
max_batch_size = 10
max_batch_timeout = 30

[[env.production.queues.consumers]]
queue = "humber-threat-intel-queue"
max_batch_size = 5
max_batch_timeout = 15

# R2 Buckets
[[env.production.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "humber-documents"

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "humber-web-assets"

[[env.production.r2_buckets]]
binding = "SECURITY_LOGS"
bucket_name = "humber-security-logs"

[[env.production.r2_buckets]]
binding = "COMPLIANCE_DOCS"
bucket_name = "humber-compliance-docs"

# Vectorize for AI-powered search
[[env.production.vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "humber-knowledge-base"

[[env.production.vectorize]]
binding = "THREAT_VECTORS"
index_name = "humber-threat-intelligence"

# Workers AI
[env.production.ai]
binding = "AI"

# Service Bindings for Security Workers
[[env.production.services]]
binding = "SECURITY_GATEWAY"
service = "humber-security-gateway"

[[env.production.services]]
binding = "THREAT_DETECTOR"
service = "humber-threat-detector"

[[env.production.services]]
binding = "BEHAVIORAL_ANALYZER"
service = "humber-behavioral-analyzer"

[[env.production.services]]
binding = "COMPLIANCE_ENGINE"
service = "humber-compliance-engine"

[[env.production.services]]
binding = "ZERO_TRUST_ENGINE"
service = "humber-zero-trust"

# Durable Objects for stateful services
[[env.production.durable_objects.bindings]]
name = "SESSION_MANAGER"
class_name = "SessionManager"

[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.production.durable_objects.bindings]]
name = "THREAT_TRACKER"
class_name = "ThreatTracker"

[durable_objects]
migrations = [
  { tag = "v1", new_classes = ["SessionManager", "RateLimiter", "ThreatTracker"] }
]

# Browser Rendering for security scanning
[env.production.browser]
binding = "BROWSER"

# Analytics Engine
[[env.production.analytics_engine_datasets]]
binding = "SECURITY_ANALYTICS"
dataset = "humber_security_metrics"

[[env.production.analytics_engine_datasets]]
binding = "COMPLIANCE_ANALYTICS"
dataset = "humber_compliance_metrics"

# Development Environment
[env.development]
name = "humber-complete-platform-dev"

[env.development.vars]
ENVIRONMENT = "development"
API_VERSION = "5.0.0-dev"
SECURITY_VERSION = "10.0-dev"
AUTH_SECRET = "dev-auth-secret-2025"
NEXTAUTH_SECRET = "dev-auth-secret-2025"
NEXTAUTH_URL = "http://localhost:3000"
NEXT_PUBLIC_API_URL = "http://localhost:8787"
LOG_LEVEL = "debug"

# Development databases
[[d1_databases]]
binding = "DB_MASTER"
database_name = "humber_os_master"
database_id = "1d392f9e-b2f3-4bfb-9bb3-f82484ad140f"

[[d1_databases]]
binding = "DB_SECURITY"
database_name = "humber-security-db-dev"
database_id = "local"

[[d1_databases]]
binding = "DB_COMPLIANCE"
database_name = "humber-compliance-db-dev"
database_id = "local"

# Development KV
[[kv_namespaces]]
binding = "KV_CACHE"
id = "16640e4d080d4de8879962927ad31732"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "81526f64e8cf4928a9ec1b903a8024ef"

[[kv_namespaces]]
binding = "THREAT_INTELLIGENCE"
id = "local"

[[kv_namespaces]]
binding = "BEHAVIORAL_ANALYTICS"
id = "local"

[[kv_namespaces]]
binding = "ZERO_TRUST"
id = "local"

# Development R2
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "humber-documents-dev"

[[r2_buckets]]
binding = "SECURITY_LOGS"
bucket_name = "humber-security-logs-dev"

# Development Vectorize
[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "humber-knowledge-base-dev"

[[vectorize]]
binding = "THREAT_VECTORS"
index_name = "humber-threat-intelligence-dev"

# Development AI
[ai]
binding = "AI"

# Development server
[dev]
ip = "localhost"
port = 8787
local_protocol = "http"

# Build configuration
[build]
command = "npm run build"
watch_paths = ["src/**/*.ts", "src/**/*.tsx", "src/**/*.js", "src/**/*.jsx"]

# Observability
[observability]
enabled = true
sampling_rate = 1.0

# Limits and performance
[limits]
cpu_ms = 50
memory_mb = 128

# Triggers for automated deployments
[[triggers.crons]]
cron = "0 * * * *"
handler = "hourlySecurityScan"

[[triggers.crons]]
cron = "0 0 * * *"
handler = "dailyComplianceReport"

[[triggers.crons]]
cron = "0 0 * * 0"
handler = "weeklyThreatAnalysis"

# Custom build for security workers
[[build.upload.rules]]
type = "ESModule"
globs = ["src/workers/**/*.ts"]

# Compatibility settings
[compatibility_date]
date = "2024-12-01"

[compatibility_flags]
flags = ["nodejs_compat", "service_binding_support", "durable_object_alarms"]

# Deployment settings
[deploy]
strategy = "rolling"
max_parallel = 5
health_check_path = "/health"
health_check_interval = 30

# Security headers (automatically added to all responses)
[site.headers]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.humber-os.ai; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

# Logging
[logpush]
enabled = true
dataset = "humber_security_logs"
destination = "r2://humber-security-logs/waf/${DATE}"
filter = "ClientRequestMethod eq 'POST' and ClientRequestPath contains '/api/'"
fields = ["ClientIP", "ClientRequestMethod", "ClientRequestPath", "EdgeResponseStatus", "WAFAction", "RayID", "SecurityLevel"]

# Tail Workers for log processing
[[tail_consumers]]
service = "log-processor"

# Routes for different services
[route]
pattern = "api.humber-os.ai/*"
zone_name = "humber-os.ai"
custom_domain = true

[route]
pattern = "security.humber-os.ai/*"
zone_name = "humber-os.ai"
custom_domain = true

[route]
pattern = "compliance.humber-os.ai/*"
zone_name = "humber-os.ai"
custom_domain = true