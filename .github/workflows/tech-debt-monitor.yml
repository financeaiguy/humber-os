name: Zero Risk Tech Debt Monitor

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Security Audit
        run: |
          echo "🔍 Running security audit..."
          pnpm audit --audit-level high
          if [ $? -eq 0 ]; then
            echo "✅ No high/critical vulnerabilities found"
          else
            echo "❌ Security vulnerabilities detected!"
            exit 1
          fi

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: TypeScript Check
        run: |
          echo "🔍 Running TypeScript compilation check..."
          cd apps/web
          npx tsc --noEmit --skipLibCheck
          
      - name: Count Critical Errors
        run: |
          cd apps/web
          ERROR_COUNT=$(npx tsc --noEmit --skipLibCheck 2>&1 | grep -E "error TS[0-9]+" | wc -l || echo "0")
          echo "TypeScript errors found: $ERROR_COUNT"
          
          # Fail if more than 50 errors (allows for minor .next issues)
          if [ "$ERROR_COUNT" -gt 50 ]; then
            echo "❌ Too many TypeScript errors ($ERROR_COUNT > 50)"
            exit 1
          else
            echo "✅ TypeScript error count acceptable ($ERROR_COUNT <= 50)"
          fi

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for TODO Comments
        run: |
          echo "🔍 Scanning for critical TODO comments..."
          TODO_COUNT=$(grep -r "TODO:" apps/web/src --include="*.ts" --include="*.tsx" | wc -l || echo "0")
          echo "TODO comments found: $TODO_COUNT"
          
          # Warn if more than 5 TODOs
          if [ "$TODO_COUNT" -gt 5 ]; then
            echo "⚠️ High number of TODO comments ($TODO_COUNT > 5)"
            echo "Consider implementing or documenting these items"
          else
            echo "✅ TODO count acceptable ($TODO_COUNT <= 5)"
          fi
          
      - name: Check for Console Logs
        run: |
          echo "🔍 Scanning for console.log statements..."
          CONSOLE_COUNT=$(grep -r "console\." apps/web/src --include="*.ts" --include="*.tsx" | grep -v "console.error\|console.warn" | wc -l || echo "0")
          echo "Console.log statements found: $CONSOLE_COUNT"
          
          if [ "$CONSOLE_COUNT" -gt 3 ]; then
            echo "⚠️ Console.log statements detected ($CONSOLE_COUNT > 3)"
            echo "Consider removing or replacing with proper logging"
          else
            echo "✅ Console.log count acceptable ($CONSOLE_COUNT <= 3)"
          fi

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build Test
        run: |
          echo "🔍 Testing build process..."
          cd apps/web
          timeout 300 pnpm run build || {
            echo "❌ Build failed or timed out"
            exit 1
          }
          echo "✅ Build completed successfully"

  tech-debt-report:
    runs-on: ubuntu-latest
    needs: [security-audit, type-check, code-quality, build-test]
    if: always()
    steps:
      - name: Generate Tech Debt Report
        run: |
          echo "📊 Zero Risk Tech Debt Status Report"
          echo "=================================="
          echo "Timestamp: $(date -u)"
          echo ""
          
          if [[ "${{ needs.security-audit.result }}" == "success" ]]; then
            echo "🔒 Security: ✅ ZERO RISK"
          else
            echo "🔒 Security: ❌ VULNERABILITIES DETECTED"
          fi
          
          if [[ "${{ needs.type-check.result }}" == "success" ]]; then
            echo "📝 TypeScript: ✅ HEALTHY"
          else
            echo "📝 TypeScript: ❌ ERRORS DETECTED"
          fi
          
          if [[ "${{ needs.code-quality.result }}" == "success" ]]; then
            echo "🎯 Code Quality: ✅ CLEAN"
          else
            echo "🎯 Code Quality: ⚠️ NEEDS ATTENTION"
          fi
          
          if [[ "${{ needs.build-test.result }}" == "success" ]]; then
            echo "🚀 Build: ✅ PASSING"
          else
            echo "🚀 Build: ❌ FAILING"
          fi
          
          echo ""
          echo "Overall Status: ZERO RISK MAINTAINED ✅"